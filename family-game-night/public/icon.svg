<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Game Night">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="0.55" stop-color="#ec4899"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <circle cx="120" cy="110" r="60" fill="#ffffff" opacity="0.12"/>
  <circle cx="430" cy="420" r="90" fill="#ffffff" opacity="0.10"/>

  <!-- fan of cards (back-left) -->
  <g filter="url(#ds)" transform="translate(168 286) rotate(-6)">
    <g transform="rotate(-22)"><rect x="-44" y="-66" width="88" height="132" rx="14" fill="#0ea5e9"/></g>
    <g transform="rotate(-8)"><rect x="-44" y="-66" width="88" height="132" rx="14" fill="#10b981"/></g>
    <g transform="rotate(8)">
      <rect x="-44" y="-66" width="88" height="132" rx="14" fill="#ffffff"/>
      <path d="M0 -36 C 22 -58 54 -30 0 14 C -54 -30 -22 -58 0 -36 Z" fill="#ec4899"/>
    </g>
  </g>

  <!-- red die (front-right) -->
  <g filter="url(#ds)" transform="translate(326 300) rotate(12)">
    <rect x="-78" y="-78" width="156" height="156" rx="34" fill="#fbbf24"/>
    <rect x="-78" y="-78" width="156" height="156" rx="34" fill="#ffffff" opacity="0.18"/>
    <g fill="#7c3aed">
      <circle cx="-40" cy="-40" r="15"/>
      <circle cx="40" cy="-40" r="15"/>
      <circle cx="-40" cy="40" r="15"/>
      <circle cx="40" cy="40" r="15"/>
      <circle cx="0" cy="0" r="15"/>
    </g>
  </g>

  <!-- board pawn (front-center) -->
  <g filter="url(#ds)" transform="translate(248 372)">
    <ellipse cx="0" cy="44" rx="52" ry="18" fill="#000" opacity="0.18"/>
    <path d="M-36 44 Q-36 18 -16 6 Q-34 -6 -22 -26 Q-12 -42 0 -42 Q12 -42 22 -26 Q34 -6 16 6 Q36 18 36 44 Z" fill="#10b981"/>
    <circle cx="0" cy="-44" r="24" fill="#10b981"/>
    <circle cx="-8" cy="-50" r="7" fill="#ffffff" opacity="0.6"/>
  </g>
</svg>
