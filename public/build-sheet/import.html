const STG_SERVER = localStorage.getItem('ls_server_url') || 'https://chemic-arlyne-orthogonally.ngrok-free.dev';

async function importBuilds() {
  const btn = document.getElementById('importBtn');
  const result = document.getElementById('result');
  btn.disabled = true;
  btn.textContent = 'Importing\u2026';
  try {
    // Save to localStorage
    let existing = [];
    try { existing = JSON.parse(localStorage.getItem('stg_builds')||'[]'); } catch(e) {}
    const existingIds = new Set(existing.map(b=>b.build&&b.build.orderId).filter(Boolean));
    let added = 0, skipped = 0;
    const addedNames = [];
    for (const build of BUILDS) {
      if (existingIds.has(build.build&&build.build.orderId)) { skipped++; continue; }
      existing.unshift(build);
      added++;
      addedNames.push((build.client&&build.client.name||'?')+' ('+((build.build&&build.build.orderId)||'?')+')');
    }
    localStorage.setItem('stg_builds', JSON.stringify(existing));

    // Save to server (permanent, survives browser clears)
    let serverMsg = '';
    try {
      const ctrl = new AbortController(); setTimeout(()=>ctrl.abort(), 8000);
      const r = await fetch(STG_SERVER+'/api/builds', {
        method: 'POST',
        headers: {'Content-Type':'application/json','ngrok-skip-browser-warning':'true'},
        body: JSON.stringify({builds: BUILDS}),
        signal: ctrl.signal
      });
      if (r.ok) {
        const d = await r.json();
        serverMsg = '<br/>\u2713 Saved to server (' + d.total + ' total on disk).';
      } else {
        serverMsg = '<br/>(Server unreachable \u2014 saved to browser only. Run the import again when server is online.)';
      }
    } catch(e) {
      serverMsg = '<br/>(Server offline \u2014 saved to browser only.)';
    }

    result.style.display='block';
    result.className='result';
    result.innerHTML='<strong style="color:#34d399">\u2713 Done! '+added+' builds imported.</strong>'+serverMsg+(skipped?' '+skipped+' already existed.':'')+'<div class="build-list">'+addedNames.join('<br/>')+'</div><a class="open-btn" href="https://centered-monsoon-pqn7.here.now/">Open Build Sheet &rarr;</a>';
    btn.textContent='\u2713 Imported';
  } catch(e) {
    result.style.display='block';
    result.className='result error';
    result.innerHTML='<strong style="color:#f87171">Error:</strong> '+e.message;
    btn.disabled=false;
    btn.textContent='Retry';
  }
}
